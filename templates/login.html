<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Smart AI Insurance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0b0f1a; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .glass { background: rgba(23, 32, 53, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div class="glass p-10 rounded-3xl w-full max-w-md shadow-2xl">
        <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 text-center mb-8">Portal Login</h1>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="bg-red-500/10 border border-red-500/50 text-red-400 p-3 rounded-xl mb-6 text-sm text-center">
              {{ messages[0] }}
            </div>
          {% endif %}
        {% endwith %}

        <form action="/login" method="POST" class="space-y-6 text-center">
            <p class="text-slate-400 text-sm mb-4">We will send a code to your email</p>
            <input type="email" name="email" placeholder="Enter your email" required 
                   class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl text-white outline-none focus:border-blue-500 text-center">
            
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold text-white transition tracking-widest">
                SEND OTP
            </button>
        </form>
    </div>
</body>
</html>
